<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ouijit</title>
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-content">
        <button id="refresh-btn" class="btn-icon-header" title="Refresh projects">
          <i data-icon="arrows-clockwise"></i>
        </button>
        <div class="search-container">
<i data-icon="magnifying-glass" class="search-icon"></i>
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Search projects..."
            autocomplete="off"
          />
        </div>
        <button id="add-folder-btn" class="btn-icon-header btn-icon-header--after" title="Add existing folder">
          <i data-icon="folder-plus"></i>
        </button>
        <button id="new-project-btn" class="btn-icon-header btn-icon-header--after" title="New project">
          <i data-icon="plus"></i>
        </button>
      </div>
    </header>

    <main class="main-content">
      <div class="project-list-header">
        <span></span>
        <span>Name</span>
        <span>Description</span>
        <span>Tags</span>
        <span class="text-right">Modified</span>
      </div>
      <div id="project-grid" class="project-grid--minimal">
        <!-- Project cards will be rendered here -->
      </div>

      <div id="empty-state" class="empty-state" style="display: none;">
<i data-icon="folder-open" class="empty-state-icon"></i>
        <h2 class="empty-state-title">No projects found</h2>
        <p class="empty-state-description">Try adjusting your search or add some projects to get started.</p>
      </div>

      <div id="loading-state" class="loading-state" style="display: none;">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading projects...</p>
      </div>
    </main>

    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
