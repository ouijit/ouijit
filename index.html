<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ouijit</title>
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body>
    <div class="app-layout">
      <!-- Sidebar: always visible, project icons stacked vertically -->
      <aside id="project-sidebar" class="sidebar">
        <div class="sidebar-drag-region"></div>
        <div id="sidebar-projects" class="sidebar-projects"></div>
        <div class="sidebar-actions">
          <button id="sidebar-add-btn" class="sidebar-action-btn" title="Add project">
            <i data-icon="plus"></i>
          </button>
        </div>
      </aside>

      <!-- Main area: header + content -->
      <div class="app-main">
        <header class="header">
          <div class="header-content">
            <!-- Populated dynamically: project header when active, empty when not -->
          </div>
        </header>

        <main class="main-content">
          <div id="welcome-state" class="welcome-state">
            <i data-icon="cursor-click" class="welcome-state-icon"></i>
            <h2 class="welcome-state-title">Select a project</h2>
            <p class="welcome-state-description">Choose a project from the sidebar to get started.</p>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
