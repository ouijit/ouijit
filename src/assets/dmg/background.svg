     width="2000" height="1500" viewBox="0 0 2000 1500">
  <rect width="2000" height="1500" fill="#ffffff"/>
  <rect x="40" y="40" width="640" height="380" rx="16" ry="16" fill="#f5f5f7"/>
  <g fill="none" stroke="#0a0a0c" stroke-width="1.5"
     stroke-linecap="round" stroke-linejoin="round">
    <polyline points="-4,-8 4,0 -4,8" transform="translate(320 235)" stroke-opacity="0.45"/>
    <polyline points="-4,-8 4,0 -4,8" transform="translate(360 235)" stroke-opacity="0.28"/>
    <polyline points="-4,-8 4,0 -4,8" transform="translate(400 235)" stroke-opacity="0.12"/>
  </g>
