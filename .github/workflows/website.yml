name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      # The site imports app sources via @app/* (see website/astro.config.mjs).
      # Rather than enumerate every imported file (fragile — any new import is
      # a chance to forget), rebuild on any src/ change. Deploys are cheap.
      - 'src/**'
      - '.github/workflows/website.yml'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install website dependencies
        run: npm ci
        working-directory: website

      - name: Build static site
        run: npm run build
        working-directory: website

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

      - id: deployment
        uses: actions/deploy-pages@v4
